services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: splitstream
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/splitstream
      JWT_ACCESS_SECRET: change-me-access
      JWT_REFRESH_SECRET: change-me-refresh
      CLIENT_ORIGIN: http://localhost:4000
      PORT: 4000
    ports:
      - "4000:4000"

volumes:
  mongo-data:
